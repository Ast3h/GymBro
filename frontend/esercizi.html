<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBro — Esercizi</title>

    <link rel="icon" type="image/png" sizes="32x32" href="Favicon32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

    <!-- Stili condivisi -->
    <link rel="stylesheet" href="stili.css">

    <!-- Funzioni condivise-->
     <script src="funzioni.js" defer></script>

    <style>
        /* Stili specifici pagina esercizi*/
        .page-content { max-width: 1200px;}

        /* intestazione pagina */
        .page-header { margin-bottom: 20px; }

        .page-title {
            font-size:   1.4rem;
            font-weight: 500;
            color:       var(--text);
        }

        .page-sub {
            font-size:  0.8rem;
            color:      var(--muted);
            margin-top: 4px;
        }

        /* badge zona attiva (arrivando dall'SVG con ?zona=) */
        .zona-badge {
            display:     inline-flex;
            align-items: center;
            gap:         8px;
            margin-bottom: 12px;
            padding:     6px 14px;
            border-radius: var(--radius);
            background:  var(--surface);
            border:      0.5px solid var(--border);
        }

        .zona-badge-label {
            font-size:      0.7rem;
            font-weight:    500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color:          var(--accent);
        }

        .zona-badge-clear {
            font-size:  0.7rem;
            color:      var(--muted);
            cursor:     pointer;
            background: none;
            border:     none;
            padding:    0;
            transition: color 0.18s;
        }

        .zona-badge-clear:hover { color: var(--text); }

        /* contatore risultati */
        .count-label {
            font-size:      0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color:          var(--muted);
            margin-bottom:  14px;
        }

        /* griglia esercizi */
        .esercizi-grid {
            display:               grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap:                   12px;
        }

        /* card esercizio */
        .ez-card {
            background:    var(--surface);
            border:        0.5px solid var(--border);
            border-radius: var(--radius);
            overflow:      hidden;
            cursor:        pointer;
            transition:    border-color 0.18s, background 0.18s;
        }

        .ez-card:hover {
            border-color: var(--accent);
            background:   var(--surface2);
        }

        .ez-img {
            width:           100%;
            height:          110px;
            background:      var(--surface2);
            display:         flex;
            align-items:     center;
            justify-content: center;
            overflow:        hidden;
        }
        .ez-img-placeholder {
            font-size: 2rem;
            opacity:   0.12;
            color:     var(--text);
        }

        .ez-body { padding: 10px 12px; }

        .ez-name {
            font-size:   0.85rem;
            font-weight: 500;
            color:       var(--text);
        }

        .ez-zona {
            font-size:  0.72rem;
            color:      var(--muted);
            margin-top: 3px;
        }

        .ez-tags {
            display:    flex;
            flex-wrap:  wrap;
            gap:        4px;
            margin-top: 8px;
        }

        /* MODALE DETTAGLIO ESERCIZIO */
        .ez-modal-img {
            width:           100%;
            height:          200px;
            background:      var(--surface2);
            display:         flex;
            align-items:     center;
            justify-content: center;
            overflow:        hidden;
        }

        .ez-modal-img-ph {
            font-size: 3.5rem;
            opacity:   0.1;
            color:     var(--text);
        }

        .ez-modal-name {
            font-size:   1.05rem;
            font-weight: 500;
            color:       var(--text);
        }

        .ez-modal-zona {
            font-size:  0.78rem;
            color:      var(--muted);
            margin-top: 3px;
        }

        .ez-modal-desc {
            font-size:   0.82rem;
            color:       var(--muted);
            line-height: 1.65;
            margin-top:  6px;
        }
        
        /* MODALE SELETTORE SCHEDA */
        .sel-list {
            display:        flex;
            flex-direction: column;
            gap:            6px;
        }

        .sel-row {
            display:         flex;
            align-items:     center;
            justify-content: space-between;
            padding:         10px 12px;
            background:      var(--surface2);
            border:          0.5px solid var(--border);
            border-radius:   var(--radius);
            transition:      border-color 0.18s;
        }

        .sel-row:hover { border-color: var(--accent); }

        .sel-row-name {
            font-size: 0.85rem;
            color:     var(--text);
        }

        .sel-row-btn {
            font-size:      0.68rem;
            font-weight:    500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color:          var(--accent);
            border:         0.5px solid rgba(237, 36, 155, 0.3);
            border-radius:  var(--radius);
            padding:        4px 10px;
            cursor:         pointer;
            background:     none;
            transition:     background 0.18s;
        }

        .sel-row-btn:hover { background: var(--accent-dim); }

        .sel-nuova {
            display:         flex;
            align-items:     center;
            justify-content: space-between;
            padding:         10px 12px;
            border:          0.5px dashed var(--border);
            border-radius:   var(--radius);
            cursor:          pointer;
            margin-top:      4px;
            transition:      border-color 0.18s;
        }

        .sel-nuova:hover { border-color: var(--accent); }

        .sel-nuova-lbl { font-size: 0.82rem; color: var(--muted); }
        .sel-nuova-txt { font-size: 0.72rem; color: var(--accent); }

        /* FEEDBACK AGGIUNTA */
        .feedback-toast {
            position:      fixed;
            bottom:        80px;
            left:          50%;
            transform:     translateX(-50%) translateY(20px);
            background:    var(--surface);
            border:        0.5px solid var(--accent);
            border-radius: var(--radius);
            padding:       10px 20px;
            font-size:     0.8rem;
            color:         var(--text);
            z-index:       300;
            opacity:       0;
            transition:    opacity 0.2s ease, transform 0.2s ease;
            white-space:   nowrap;
        }

        .feedback-toast.show {
            opacity:   1;
            transform: translateX(-50%) translateY(0);
        }      

        @media (max-width: 600px) {
            .esercizi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }        
    </style>
</head>
<body>
    <!-- TOPBAR-->
    <header class="topbar">
        <div class="topbar-left">
            <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()">
                <span></span><span></span><span></span> <!-- Visivamente tre linee che formano l'icona della bar-->
            </button>
            <a href="home.html" class="logo">
            <img src="Favicon64x64.png" alt="" class="logo-img">
            GYM<span>BRO</span>
        </a>
        </div>
        <div class="topbar-icons">
            <div class="color-switch pink" id="color-switch" onclick="toggleAccent()" title="Cambia colore">
                <div class="switch-knob"></div>
            </div>
                <!-- icona campanella -->
                <div class="notif-wrap" id="notif-wrap">
                <button class="icon-btn" id="notif-btn"
                        onclick="toggleNotifiche(event)"
                        title="Notifiche"
                        aria-label="Notifiche"
                        aria-expanded="false">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <div class="notif-dot" id="notif-dot"></div>
                </button>

                <!-- dropdown -->
                <div class="notif-dropdown" id="notif-dropdown" role="dialog" aria-label="Notifiche">

                    <div class="notif-dropdown-header">
                        <span class="notif-dropdown-title">Notifiche</span>
                        <button class="notif-mark-all" id="notif-mark-all"
                                onclick="segnaLette()" style="display:none;">
                            Segna tutte come lette
                        </button>
                    </div>

                    <!-- lista — popolata da JS -->
                    <div class="notif-list" id="notif-list">
                        <div class="notif-empty" id="notif-empty">
                            Nessuna notifica per ora
                        </div>
                    </div>

                    <div class="notif-dropdown-footer" id="notif-footer" style="display:none;">
                        <button class="notif-see-all" onclick="vediTutte()">Vedi tutte</button>
                    </div>

                </div>
            </div>

            <a href="schede.html" class="icon-btn" title="Le mie schede">
                <svg viewBox="0 0 24 24">
                    <rect x="4" y="3" width="16" height="18" rx="2"/>
                    <line x1="8" y1="8" x2="16" y2="8"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                    <line x1="8" y1="16" x2="12" y2="16"/>
                </svg>
            </a>
            <a href="profilo.html" class="icon-btn" title="Profilo">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
            </a>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <a href="esercizi.html" class="sidebar-item" style="color:var(--text); border-bottom:0.5px solid var(--border); margin-bottom:4px; padding-bottom:12px;">Esercizi</a>
        <a href="home.html" class="sidebar-item">Home</a>
        <a href="schede.html" class="sidebar-item">Schede</a>
        <a href="profilo.html" class="sidebar-item">Profilo</a>
    </nav>

    <!--  CONTENUTO  -->
    <div class="page-layout">
        <div class="page-content">

            <div class="page-header">
                <div class="page-title">Esercizi</div>
                <div class="page-sub">Seleziona una zona o esplora tutti gli esercizi</div>
            </div>

            <!-- badge zona attiva — visibile solo se arrivato dall'SVG con ?zona= -->
            <div class="zona-badge" id="zona-badge" style="display:none;">
                <span class="zona-badge-label" id="zona-badge-label"></span>
                <button class="zona-badge-clear" onclick="rimuoviFiltroZona()">✕ Tutti</button>
            </div>

            <!-- filtri zona muscolare -->
            <div class="chips-row" id="filtri-zona" style="margin-bottom:16px;">
                <button class="chip active" onclick="filtraZona('tutte',   this)">Tutti</button>
                <button class="chip"        onclick="filtraZona('Gambe',   this)">Gambe</button>
                <button class="chip"        onclick="filtraZona('Petto',   this)">Petto</button>
                <button class="chip"        onclick="filtraZona('Braccia', this)">Braccia</button>
                <button class="chip"        onclick="filtraZona('Spalle',  this)">Spalle</button>
                <button class="chip"        onclick="filtraZona('Addome',  this)">Addome</button>
                <button class="chip"        onclick="filtraZona('Schiena', this)">Schiena</button>
                <button class="chip"        onclick="filtraZona('Glutei',  this)">Glutei</button>
            </div>

            <!-- contatore risultati -->
            <div class="count-label" id="count-label">— esercizi</div>

            <!--
                BACKEND: riempire con creaCardEsercizio() via fetch('/api/esercizi?livello=X')
                Il livello viene letto dal localStorage (salvato dal profilo).
            -->
            <div class="esercizi-grid" id="grid-esercizi"></div>

        </div>
    </div>
    
    <!-- BOTTOM NAV MOBILE -->
    <nav class="bottom-nav">
        <a href="home.html" class="bottom-nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></a>
        <a href="esercizi.html" class="bottom-nav-item"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>Esercizi</span></a>
        <a href="schede.html"   class="bottom-nav-item">
            <svg viewBox="0 0 24 24">
                <rect x="4" y="3" width="16" height="18" rx="2"/>
                <line x1="8" y1="8" x2="16" y2="8"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
                <line x1="8" y1="16" x2="12" y2="16"/>
            </svg><span>Schede</span></a>
        <a href="profilo.html"  class="bottom-nav-item active"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Profilo</span></a>
    </nav>

        <!-- MODALE DETTAGLIO ESERCIZIO -->
    <div class="modal-overlay" id="modal-dettaglio">
        <div class="modal">
            <div class="ez-modal-img" id="modal-img">
                <!-- BACKEND: sostituire con <img src="URL_GIF"> quando disponibile -->
                <div class="ez-modal-img-ph">◈</div>
            </div>
            <div class="modal-header">
                <div>
                    <div class="ez-modal-name" id="modal-nome"></div>
                    <div class="ez-modal-zona" id="modal-zona"></div>
                </div>
                <button class="modal-close" onclick="chiudiDettaglio()">✕</button>
            </div>
            <div class="modal-body">
                <div class="ez-modal-desc" id="modal-desc"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="apriSelettoreScheda()">+ Aggiungi a scheda</button>
                <button class="btn-ghost"   onclick="chiudiDettaglio()">Chiudi</button>
            </div>
        </div>
    </div>

    <!-- MODALE SELETTORE SCHEDA -->
    <div class="modal-overlay" id="modal-selettore">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <div class="modal-title">Aggiungi a una scheda</div>
                    <div class="modal-sub" id="sel-nome-esercizio"></div>
                </div>
                <button class="modal-close" onclick="chiudiSelettore()">✕</button>
            </div>
            <div class="modal-body">
                <!--
                    BACKEND: riempire con creaRigaScheda() via fetch('/api/schede/utente')
                -->
                <div class="sel-list" id="sel-lista-schede">
                    <div style="font-size:0.8rem; color:var(--muted); padding:8px 0;">
                        Nessuna scheda disponibile.
                    </div>
                </div>
                <div class="sel-nuova" onclick="nuovaSchedaDaEsercizio()">
                    <span class="sel-nuova-lbl">Crea nuova scheda...</span>
                    <span class="sel-nuova-txt">+ Crea</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" onclick="chiudiSelettore()">Annulla</button>
            </div>
        </div>
    </div>

    <!-- toast feedback aggiunta -->
    <div class="feedback-toast" id="feedback-toast"></div>

    <script>

        /* STATO LOCALE */
        let esercizioCorrente= null;

        /* FILTRO ZONA */
        function filtraZona(zona, btn) {
        const tutteBtn = document.querySelector('#filtri-zona .chip:first-child');

        /* se premi il chip già attivo, torna a "Tutti" */
        if (btn && btn.classList.contains('active') && zona !== 'tutte') {
            document.querySelectorAll('#filtri-zona .chip').forEach(c => c.classList.remove('active'));
            tutteBtn.classList.add('active');
            zona = 'tutte';
        } else if (btn) {
            document.querySelectorAll('#filtri-zona .chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
        }

        const cards = document.querySelectorAll('.ez-card');
        let visibili = 0;
        cards.forEach(card => {
            const zone   = card.dataset.zone ? card.dataset.zone.split(',') : [];
            const mostra = zona === 'tutte' || zone.includes(zona);
            card.style.display = mostra ? 'block' : 'none';
            if (mostra) visibili++;
        });

        document.getElementById('count-label').textContent = visibili + ' esercizi';
        }

        function rimuoviFiltroZona() {
            document.getElementById('zona-badge').style.display = 'none';
            filtraZona('tutte', document.querySelector('#filtri-zona .chip'));
        }    
        
        /* CREA CARD ESERCIZIO*/
        function creaCardEsercizio(ez) {
            const card = document.createElement('div');
            card.className       = 'ez-card';
            card.dataset.id      = ez.id;
            card.dataset.zone    = ez.zone.join(',');

            const tags = ez.zone.map(z => `<span class="tag">${z}</span>`).join('');

            card.innerHTML = `
                <div class="ez-img">
                    ${ez.img_url
                        ? `<video  src="${ez.img_url}" alt="${ez.nome}" style="width:100%;height:100%;object-fit:cover;"></video></video>`
                        : `<div class="ez-img-placeholder">◈</div>`}
                </div>
                <div class="ez-body">
                    <div class="ez-name">${ez.nome}</div>
                    <div class="ez-zona">${ez.zone.join(' · ')}</div>
                    <div class="ez-tags">${tags}</div>
                </div>`;

            card.addEventListener('click', () => apriDettaglio(ez));
            return card;
        }

        /* MODALE DETTAGLIO */
        function apriDettaglio(ez) {
            esercizioCorrente = ez;

            document.getElementById('modal-nome').textContent = ez.nome;
            document.getElementById('modal-zona').textContent = ez.zone.join(' · ');
            document.getElementById('modal-desc').textContent = ez.descrizione;

            const imgContainer = document.getElementById('modal-img');
            imgContainer.innerHTML = ez.img_url
                ? `<video autoplay loop muted playsinlines src="${ez.img_url}" alt="${ez.nome}" style="width:100%;height:100%;object-fit:cover;"></video>`
                : `<div class="ez-modal-img-ph">◈</div>`;

            document.getElementById('modal-dettaglio').classList.add('open');
        }

        function chiudiDettaglio() {
            document.getElementById('modal-dettaglio').classList.remove('open');
        }

        document.getElementById('modal-dettaglio').addEventListener('click', function(e) {
            if (e.target === this) chiudiDettaglio();
        });

        /* MODALE SELETTORE SCHEDA */
        function apriSelettoreScheda() {
            if (!esercizioCorrente) return;
            document.getElementById('sel-nome-esercizio').textContent =
                'Stai aggiungendo: ' + esercizioCorrente.nome;
            chiudiDettaglio();

            document.getElementById('modal-selettore').classList.add('open');
        }

        function chiudiSelettore() {
            document.getElementById('modal-selettore').classList.remove('open');
        }

        document.getElementById('modal-selettore').addEventListener('click', function(e) {
            if (e.target === this) chiudiSelettore();
        });

        /* CREA RIGA SCHEDE NEL SELETTORE */
        function creaRigaScheda(scheda) {
            const row = document.createElement('div');
            row.className = 'sel-row';
            row.innerHTML = `
                <span class="sel-row-name">${scheda.nome}</span>
                <button class="sel-row-btn" onclick="aggiungiAScheda('${scheda.id}')">Aggiungi</button>`;
            return row;
        }

        /* AGGIUNGE ESERCIZIO A SCHEDA */
        function aggiungiAScheda(schedaId) {
            if (!esercizioCorrente) return;
            chiudiSelettore();
            mostraFeedback('Aggiunto a scheda');
        }

        function nuovaSchedaDaEsercizio() {
            /* TODO: aprire modale creazione nuova scheda, poi aggiungiAScheda(nuovaId) */
        }       

        /* TOAST FEEDBACK */
        function mostraFeedback(messaggio) {
            const toast = document.getElementById('feedback-toast');
            toast.textContent = messaggio;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        }

        /* LEGGE ?zona= DALL'URL */
        (function initZonaUrl() {
            const params = new URLSearchParams(window.location.search);
            const zona   = params.get('zona');
            if (zona) {
                document.getElementById('zona-badge-label').textContent = zona;
                document.getElementById('zona-badge').style.display = 'flex';
                const chip = [...document.querySelectorAll('#filtri-zona .chip')]
                    .find(c => c.textContent === zona);
                if (chip) filtraZona(zona, chip);
            }
        })();


        async function loadEx(){
            const response = await fetch('http://localhost:3000/fullexercises', {
                method : 'GET',
                headers : {
                    'Authorization' : 'Bearer ' + localStorage.getItem('gymbros-token')
                }
            })
            const divex = document.getElementById('grid-esercizi')
            const data = await response.json()
            data.forEach(data => {
                const ez = {
                id : data.id,
                zone : [data.macroPart, data.bodyPart],
                img_url : data.videoUrl,
                nome : data.nameIt,
                }
            
                
                const new_card =creaCardEsercizio(ez)
                divex.appendChild(new_card)
            })
            

            
        }

        loadEx()
    </script>
</body>
</html>
