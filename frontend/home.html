<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBro</title>

    <!-- Favicon-->
     <link rel="icon" type="image/svg+xml" href="favicon.svg">
     <link rel="apple-touch-icon" href="favicon.svg">
    <!-- Link per poter usare i font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- font importati-->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

    <!-- STILI CONDIVISI -->
     <link rel="stylesheet" href="stili.css">
    <!-- FUNZIONI CONDIVISE-->
     <script src="funzioni.js" defer></script>

    <style>
        body{
            min-width: 320px; /* evita che si rompa su zoom estremo*/
            overflow-x: auto;
            overflow-y: auto;
        }

        /* LOGO FAVICON*/

        .logo-favicon{
            width: 28px;
            height: 20px;
            object-fit: contain;
        }

        .logo-img{
            width: 30px;
            height: 30px;
            object-fit: contain;
        }


        /* HERO*/
        .hero{
            height: 100vh;
            padding-top: 56px;
            display: grid;
            grid-template-columns: 1fr minmax(180px, 220px) 1fr;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Leggero alone dietro il corpo M e il corpo F */
        .hero::before{
            content: '';
            position: absolute;
            inset: 0;
            background: 
            radial-gradient(ellipse 55% 45% at 18% 65%, var(--accent-glow) 0%, transparent 70%),
            radial-gradient(ellipse 55% 45% at 82% 65%, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Contenitore svg corpo*/
        .body-con{
            display: flex; 
            flex-direction: column;
            align-items: center;
            padding: 15px 4% 16px;
            padding-top: 15px; /* Distanza da topbar*/
            gap: 0.5px; /* Distanza tra label e svg*/
            justify-content: flex-start;
        }

        .body-label{
            font-size: 0.68rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            transition: color 0.25s;
        }

        .view-label{
            font-size: 0.62rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 6px;
            transition: color 0.25s;
        }

        .body-con:hover .body-label{
            color: var(--accent);
        }

        .body-con:hover .view-label{
            color: var(--accent)
        }

        /* SVG responsive*/
        .svg-container{
            width: 100%;
            max-height: calc(100vh -56px - 80px);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .svg-container svg{
            width: 75%;
            height: auto;
            display: block;
            max-width: 100%;
            margin: 0 auto;
        }

        /* ZONE FEMMINILI: base scuro */
        #svg-fem g,
        #svg-fem path{ pointer-events: none;}

        #svg-fem-back g,
        #svg-fem-back path{ pointer-events: none;}

        /* Parti non interattive*/
        #svg-fem #am4 path,
        #svg-fem #am6 path,
        #svg-fem #am8 path,
        #svg-fem #am10 path,
        #svg-fem #am12 path,
        #svg-fem #am14 path,
        #svg-fem #am16 path,
        #svg-fem #am18 path,
        #svg-fem #am20 path,
        #svg-fem #am22 path,

        #svg-fem-back #am4 path, 
        #svg-fem-back #am6 path,
        #svg-fem-back #am8 path,
        #svg-fem-back #am10 path,
        #svg-fem-back #am12 path,
        #svg-fem-back #am14 path,
        #svg-fem-back #am16 path,
        #svg-fem-back #am18 path,
        #svg-fem-back #am20 path,
        #svg-fem-back #am22 path{
            fill: #1c1c22 !important;
            stroke: none;
        }

        /*Parti interattive: grigio scuro*/
        #svg-fem #am23 path,
        #svg-fem #am27 path,
        #svg-fem #am29 path,
        #svg-fem #am32 path,
        #svg-fem #am35 path,

        #svg-fem-back #am23 path,
        #svg-fem-back #am27 path,
        #svg-fem-back #am31 path,
        #svg-fem-back #am35 path,
        #svg-fem-back #am37 path{
            fill: #2e2e3a !important;
            transition: fill 0.2s ease;
            pointer-events: visiblePainted;
            cursor: pointer;
        }
        /* Colore quando si passa sulle parti interattive*/
        #svg-fem #am23:hover path { fill: var(--accent) !important; }
        #svg-fem #am27:hover path { fill: var(--accent) !important; }
        #svg-fem #am29:hover path { fill: var(--accent) !important; }
        #svg-fem #am32:hover path { fill: var(--accent) !important; }
        #svg-fem #am35:hover path { fill: var(--accent) !important; }

        #svg-fem-back #am23:hover path { fill: var(--accent) !important; }
        #svg-fem-back #am27:hover path { fill: var(--accent) !important; }
        #svg-fem-back #am31:hover path { fill: var(--accent) !important; }
        #svg-fem-back #am35:hover path { fill: var(--accent) !important; }
        #svg-fem-back #am37:hover path { fill: var(--accent) !important; }

        /* ZONE MASCHILI: base scuro */
        #svg-male g,
        #svg-male path{ pointer-events: none;}

        #svg-male-back g,
        #svg-male-back path{ pointer-events: none;}

        /* Parti non interattive*/
        #svg-male #am3 path,
        #svg-male #am4 path,
        #svg-male #am5 path,
        #svg-male #am6 path,
        #svg-male #am7 path,
        #svg-male #am8 path,
        #svg-male #am9 path,
        #svg-male #am10 path,
        #svg-male #am11 path,
        #svg-male #am12 path,
        #svg-male #am13 path,
        #svg-male #am14 path,
        #svg-male #am15 path,

        #svg-male-back #am3 path,
        #svg-male-back #am4 path,
        #svg-male-back #am5 path,
        #svg-male-back #am6 path,
        #svg-male-back #am7 path,
        #svg-male-back #am8 path,
        #svg-male-back #am9 path,
        #svg-male-back #am10 path,
        #svg-male-back #am11 path,
        #svg-male-back #am12 path,
        #svg-male-back #am13 path,
        #svg-male-back #am14 path,
        #svg-male-back #am15 path,
        #svg-male-back #am16 path{
            fill: #1c1c22 !important;
            stroke: none;
        }

        /*Parti interattive: grigio scuro*/
        #svg-male #am17 path,
        #svg-male #am21 path,
        #svg-male #am23 path,
        #svg-male #am27 path,
        #svg-male #am31 path,

        #svg-male-back #am16 path,

        #svg-male-back #am24 path,
        #svg-male-back #am28 path,
        #svg-male-back #am31 path{
            fill: #2e2e3a !important;
            transition: fill 0.2s ease;
            pointer-events: visiblePainted;
            cursor: pointer;
        }
        /* Colore quando si passa sulle parti interattive*/
        #svg-male #am17:hover path { fill: var(--accent) !important; }
        #svg-male #am21:hover path { fill: var(--accent) !important; }
        #svg-male #am23:hover path { fill: var(--accent) !important; }
        #svg-male #am27:hover path { fill: var(--accent) !important; }
        #svg-male #am31:hover path { fill: var(--accent) !important; }

        #svg-male-back #am16:hover path { fill: var(--accent) !important;}
        #svg-male-back #am20:hover path { fill: var(--accent) !important;}
        #svg-male-back #am24:hover path { fill: var(--accent) !important;}
        #svg-male-back #am28:hover path { fill: var(--accent) !important;}
        #svg-male-back #am31:hover path { fill: var(--accent) !important;}

        /* SVG F MOBILE*/
        #svg-fem-mobile g,
        #svg-fem-mobile path { pointer-events: none; }

        #svg-fem-back-mob g,
        #svg-fem-back-mob path {pointer-events: none;}

        /* Parti non interattive*/
        #svg-fem-mobile #am4 path,
        #svg-fem-mobile #am6 path,
        #svg-fem-mobile #am8 path,
        #svg-fem-mobile #am10 path,
        #svg-fem-mobile #am12 path,
        #svg-fem-mobile #am14 path,
        #svg-fem-mobile #am16 path,
        #svg-fem-mobile #am18 path,
        #svg-fem-mobile #am20 path,
        #svg-fem-mobile #am22 path,

        #svg-fem-back-mob #am4 path, 
        #svg-fem-back-mob #am6 path,
        #svg-fem-back-mob #am8 path,
        #svg-fem-back-mob #am10 path,
        #svg-fem-back-mob #am12 path,
        #svg-fem-back-mob #am14 path,
        #svg-fem-back-mob #am16 path,
        #svg-fem-back-mob #am18 path,
        #svg-fem-back-mob #am20 path,
        #svg-fem-back-mob #am22 path{
            fill: #1c1c22 !important;
            stroke: none;
        }

        /* Parti interattive: grigio scuro fem mobile*/
        #svg-fem-mobile #am23 path,
        #svg-fem-mobile #am27 path,
        #svg-fem-mobile #am29 path,
        #svg-fem-mobile #am32 path,
        #svg-fem-mobile #am35 path,

        #svg-fem-back-mob #am23 path,
        #svg-fem-back-mob #am27 path,
        #svg-fem-back-mob #am31 path,
        #svg-fem-back-mob #am35 path,
        #svg-fem-back-mob #am37 path {
            fill: #2e2e3a !important;
            transition: fill 0.2s ease;
            pointer-events: visiblePainted;
            cursor: pointer;
        }

        /* Parti colorate fem mobile*/
        #svg-fem-mobile #am23:hover path { fill: var(--accent) !important; }
        #svg-fem-mobile #am27:hover path { fill: var(--accent) !important; }
        #svg-fem-mobile #am29:hover path { fill: var(--accent) !important; }
        #svg-fem-mobile #am32:hover path { fill: var(--accent) !important; }
        #svg-fem-mobile #am35:hover path { fill: var(--accent) !important; }

        #svg-fem-back-mob #am23:hover path { fill: var(--accent) !important; }
        #svg-fem-back-mob #am27:hover path { fill: var(--accent) !important; }
        #svg-fem-back-mob #am31:hover path { fill: var(--accent) !important; }
        #svg-fem-back-mob #am35:hover path { fill: var(--accent) !important; }
        #svg-fem-back-mob #am37:hover path { fill: var(--accent) !important; }

        /* Regole corpo m mobile */
        #svg-male-mobile g,
        #svg-male-mobile path { pointer-events: none; }

        #svg-male-back-mob g,
        #svg-male-back-mob path { pointer-events: none;}

        /* Parti non interattive*/
        #svg-male-mobile #am3 path,
        #svg-male-mobile #am4 path,
        #svg-male-mobile #am5 path,
        #svg-male-mobile #am6 path,
        #svg-male-mobile #am7 path,
        #svg-male-mobile #am8 path,
        #svg-male-mobile #am9 path,
        #svg-male-mobile #am10 path,
        #svg-male-mobile #am11 path,
        #svg-male-mobile #am12 path,
        #svg-male-mobile #am13 path,
        #svg-male-mobile #am14 path,
        #svg-male-mobile #am15 path,
        #svg-male-mobile #am16 path,

        #svg-male-back-mob #am3 path,
        #svg-male-back-mob #am4 path,
        #svg-male-back-mob #am5 path,
        #svg-male-back-mob #am6 path,
        #svg-male-back-mob #am7 path,
        #svg-male-back-mob #am8 path,
        #svg-male-back-mob #am9 path,
        #svg-male-back-mob #am10 path,
        #svg-male-back-mob #am11 path,
        #svg-male-back-mob #am12 path,
        #svg-male-back-mob #am13 path,
        #svg-male-back-mob #am14 path,
        #svg-male-back-mob #am15 path,
        #svg-male-back-mob #am16 path{
            fill: #1c1c22 !important;
            stroke: none;
        }

        /* Parti interattive: grigio scuro male mobile*/
        #svg-male-mobile #am17 path,
        #svg-male-mobile #am21 path,
        #svg-male-mobile #am23 path,
        #svg-male-mobile #am27 path,
        #svg-male-mobile #am31 path,

        #svg-male-back-mob #am16 path,
        #svg-male-back-mob #am20 path,
        #svg-male-back-mob #am24 path,
        #svg-male-back-mob #am28 path,
        #svg-male-back-mob #am31 path {
            fill: #2e2e3a !important;
            transition: fill 0.2s ease;
            pointer-events: visiblePainted;
            cursor: pointer;
        }

        /* Parti colorate male mobile*/
        #svg-male-mobile #am17:hover path { fill: var(--accent) !important; }
        #svg-male-mobile #am21:hover path { fill: var(--accent) !important; }
        #svg-male-mobile #am23:hover path { fill: var(--accent) !important; }
        #svg-male-mobile #am27:hover path { fill: var(--accent) !important; }
        #svg-male-mobile #am31:hover path { fill: var(--accent) !important; }

        #svg-male-back-mob #am16:hover path { fill: var(--accent) !important;}
        #svg-male-back-mob #am20:hover path { fill: var(--accent) !important;}
        #svg-male-back-mob #am24:hover path { fill: var(--accent) !important;}
        #svg-male-back-mob #am28:hover path { fill: var(--accent) !important;}
        #svg-male-back-mob #am31:hover path { fill: var(--accent) !important;}

        /* bordo sottile su tutte le zone interattive*/
        #svg-fem #am23 path, #svg-fem #am27 path, #svg-fem #am29 path,
        #svg-fem #am32 path, #svg-fem #am35 path,

        #svg-fem-back #am23 path, #svg-fem-back #am27 path,
        #svg-fem-back #am31 path, #svg-fem-back #am35 path, #svg-fem-back #am37 path,

        #svg-male #am17 path, #svg-male #am21 path, #svg-male #am23 path,
        #svg-male #am27 path, #svg-male #am31 path,

        #svg-male-back #am16 path, #svg-male-back #am20 path,
        #svg-male-back #am24 path, #svg-male-back #am28 path, #svg-male-back #am31 path {
            stroke:       rgba(255, 255, 255, 0.08) !important;
            stroke-width: 0.8 !important;
        }

        /* bordo sottile zone interattive mobile */
        #svg-fem-mobile #am23 path, #svg-fem-mobile #am27 path,
        #svg-fem-mobile #am29 path, #svg-fem-mobile #am32 path,
        #svg-fem-mobile #am35 path,

        #svg-fem-back-mob #am23 path, #svg-fem-back-mob #am27 path,
        #svg-fem-back-mob #am31 path, #svg-fem-back-mob #am35 path,
        #svg-fem-back-mob #am37 path,

        #svg-male-mobile #am17 path, #svg-male-mobile #am21 path,
        #svg-male-mobile #am23 path, #svg-male-mobile #am27 path,
        #svg-male-mobile #am31 path,

        #svg-male-back-mob #am17 path, #svg-male-back-mob #am36 path,
        #svg-male-back-mob #am40 path, #svg-male-back-mob #am47 path,
        #svg-male-back-mob #am51 path {
            stroke:       rgba(255, 255, 255, 0.08) !important;
            stroke-width: 0.8 !important;
        }
        /* Colonna centrale*/
        .center-col{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            padding: 32px 20px;
            min-width: 190px;
            max-width: 250px;
            text-align: center;
            z-index: 1;
        }

        .hero-title{
            font-family: var(--font-display);
            font-size: clamp(2.6rem, 3vw, 3.4rem);
            line-height: 0.88;
            letter-spacing: 0.05em;
            color: var(--text);
        }
        .hero-title span{
            color: var(--accent);
        }

        .hero-title em{
            font-style: normal;
            color: var(--accent);
        }

        .hero-subtitle{
            font-size: 0.78rem;
            font-weight: 300;
            color: var(--muted);
            line-height: 1.65;
        }

        /* Separatore testo*/
        .divider{
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            font-size: 0.66rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--border);
        }

        .divider::before,
        .divider::after{
            content: '';
            flex: 1;
            height: 0.5px;
            background: var(--border);
        }

        /* PULSANTI*/
        .btn-group{
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        /* Pulsante "Registrati/Accedi" */
        .btn-primary{
            width: 100%;
            padding: 11px 0;
            border-radius: var(--radius);
            background: var(--accent);
            color: #fff;
            font-family: var(--font-body);
            font-size: 0.73rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: opacity 0.18s, transform 0.12s;
        }

        .btn-primary:hover{
            opacity: 0.85;
        }
        .btn-primary:active{
            transform: scale(0.97);
        }

        .mobile-svg-section{
            display: none;
        }

        /* Pulsante esplora*/
        .btn-secondary{
            width: 100%;
            padding: 11px 0;
            border-radius: var(--radius);
            background: transparent;
            color: var(--muted);
            font-family: var(--font-body);
            font-size: 0.73rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 0.5px solid var(--border);
            cursor: pointer;
            transition: border-color 0.18s, color 0.18s, background 0.18s;
        }

        .btn-secondary:hover{
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* Pulsante rotazione - generale*/
        .rotate-btn{
            position: absolute;
            bottom: 16px;
            left: 150px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface2);
            border: 0.5px solid var(--border);
            border-radius: var(--radius);
            padding: 5px 10px;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
        }

        .rotate-btn:hover{
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .rotate-btn svg{
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .rotate-label{
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            transition: color 0.18s;
        }

        .rotate-btn:hover .rotate-label{
            color: var(--accent);
        }

        .mobile-btn-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        /* Etichetta vicino al mouse quando si passa su un muscolo*/
        #muscle-etichetta{
            position:fixed;
            background: var(--surface);
            border: 0.5px solid var(--border);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: var(--radius);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s;
            z-index: 200;
            white-space: nowrap;
        }

        #muscle-etichetta.show{
            opacity: 1;
        }

        /* Responsive: mobile */
        @media (max-width: 1024px){
            body{
                overflow-y: auto;
            }
            /* Stack verticale */
            .hero{
                height: auto;
                min-height: 100vh;
                position: relative;
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                align-items: start;
                padding-bottom: 40px;
            }

            /* Centro sale in cima */
            .center-col{
                order: -1;
                max-width: 100%;
                width: 100%;
                padding: 36px 28px 20px;
            }

            /* No colonne*/
            .body-con-man{
                display:none;
            }

            .body-con-fem{
                display:none;
            }

            /* Contenitore svg unico centrale*/
            .mobile-svg-container{
                width: 100%;
                padding: 0 16px;
                position: relative;
            }
            .mobile-svg-section{
                display: block;
            }

            .mobile-svg-wrap{
                width: 100%;
                border: 0.5px solid var(--border);
                border-radius: var(--radius);
                background: var(--surface);
                padding: 16px;
                position: relative;
            }

            .mobile-body-label{
                font-size: 0.68rem;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 10px;
            }

            .mobile-toggle-btn{
                display: flex;
                align-items: center;
                gap: 5px;
                background: var(--surface2);
                border: 0.5px solid var(--border);
                border-radius: 6px;
                padding: 5px 10px;
                cursor: pointer;
                transition: border-color 0.18s, background 0.18s;
            }

            .mobile-toggle-btn:hover{
                border-color: var(--accent);
                background: var(--accent-dim)
            }

            .mobile-toggle-label{
                font-size: 0.68rem;
                font-weight: 500;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--muted);
            }

            .mobile-rotate-btn{
                display: flex;
                align-items: center;
                gap: 5px;
                background: var(--surface2);
                border: 0.5px solid var(--border);
                border-radius: var(--radius);
                padding: 5px 10px;
                cursor: pointer;
                transition: border-color 0.18s, background 0.18s;
            }

            .mobile-rotate-btn:hover{
                border-color: var(--accent);
                background: var(--accent-dim);
            }

            .mobile-rotate-btn svg{
                width: 14px;
                height: 14px;
                flex-shrink: 0;
            }

            .mobile-rotate-label{
                font-size: 1.3rem;
                align-items: center;
                margin-left: 0.2rem;
                font-weight: 500;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--muted);
            }
        }

        /* Animazione entrata*/
        @keyframes fade{
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-bar {
            animation: fade 0.45s ease both;
        }

    <script>
        /* Check bottone login/reg*/
        async function checkLogged(){
            if(localStorage.getItem('gymbros-token')){
                const response = await fetch('http://localhost:3000/users/profile', {
                method : 'GET',
                headers : {
                    'Authorization' : 'Bearer ' + localStorage.getItem('gymbros-token')
                }
                })

                if(response.status === 401){
                    localStorage.removeItem('gymbros-token')
                    return
                }

                document.getElementById('button_reg').style.display = 'none'
                document.getElementById('account-divider').style.display = 'none'
                
            }
        }
        checkLogged()
        /* Rotazione generale M */
        let maleShowingFront= true;

        function rotateMale(){
            maleShowingFront= !maleShowingFront;
            const front= document.getElementById('svg-male');
            const back= document.getElementById('svg-male-back');
            const label= document.getElementById('view-label-male');

            if(maleShowingFront){
                front.style.display='block';
                back.style.display= 'none';
                if(label) label.textContent= 'Anteriore';
            }else{
                front.style.display='none';
                back.style.display= 'block';
                if(label) label.textContent= 'Posteriore';
            }
        }

        /* Rotazione generale F */
        let femShowingFront= true;

        function rotateFem(){
            femShowingFront= !femShowingFront;
            const front= document.getElementById('svg-fem');
            const back= document.getElementById('svg-fem-back');
            const label= document.getElementById('view-label-fem');

            if(femShowingFront){
                front.style.display='block';
                back.style.display= 'none';
                if(label) label.textContent= 'Anteriore';
            }else{
                front.style.display='none';
                back.style.display= 'block';
                if(label) label.textContent= 'Posteriore';
            }
        }


        /* Mobile: toggle tra SVG femmina e maschio*/
        let mobileShowingFemale = false;

        function mobileToggle() {
            mobileShowingFemale = !mobileShowingFemale;
            
            const female = document.getElementById('svg-fem-mobile');
            const male  = document.getElementById('svg-male-mobile');
            const label = document.getElementById('mobile-body-label');
            const toggleLabel = document.getElementById('mobile-toggle-label');
            const arrow = document.getElementById('mobile-arrow');

            if(mobileShowingFemale){
                female.style.display= 'block';
                male.style.display= 'none';
                label.textContent= 'Donna';
                toggleLabel.textContent= 'Uomo';
                arrow.textContent= '←';
            }else{
                female.style.display= 'none';
                male.style.display= 'block';
                label.textContent= 'Uomo';
                toggleLabel.textContent= 'Donna';
                arrow.textContent= '→';
            }
        }

         /* Mostra sezione mobile svg solo sotto i 600px*/
        function handleMobileLayout(){
            const mobileSection= document.getElementById('mobile-svg-section');
            const maleCols= document.querySelectorAll('.body-con-male');
            const femaleCols= document.querySelectorAll('.body-con-fem');

            if(window.innerWidth <= 600){
                if(mobileSection) mobileSection.style.display= 'block';
                maleCols.forEach(el => el.style.display= 'none');
                femaleCols.forEach(el => el.style.display= 'none');
                }else{
                    if(mobileSection) mobileSection.style.display= 'none';
                    maleCols.forEach(el => el.style.display= '');
                    femaleCols.forEach(el => el.style.display= '');
                }
            }
            handleMobileLayout();
            window.addEventListener('resize', handleMobileLayout);

        /*Rotazione mobile*/
        let mobileShowingFront= true;

        function rotateMobile(){
            mobileShowingFront= !mobileShowingFront;

            const isFemale= mobileShowingFemale;
            
            if(isFemale){
                const front= document.getElementById('svg-fem-mobile');
                const back= document.getElementById('svg-fem-back-mob');
                if(mobileShowingFront){
                    front.style.display='block';
                    back.style.display='none';
                }else{
                    front.style.display='none';
                    back.style.display='block';
                }
            }else{
                const front= document.getElementById('svg-male-mobile');
                const back= document.getElementById('svg-male-back-mob');
                if(mobileShowingFront){
                    front.style.display='block';
                    back.style.display='none';
                }else{
                    front.style.display='none';
                    back.style.display='block';
                }
            }

            /* aggiorna label vista mobile*/
            const viewLabel = document.getElementById('mobile-view-label');
            if(viewLabel) viewLabel.textContent = mobileShowingFront ? 'Anteriore' : 'Posteriore';

            /* Resetta rotazione mobile quando si cambia corpo con il toggle*/
            const originalMobileToggle= window.mobileToggle;
            window.mobileToggle= function(){
                mobileShowingFront= true;
                const frontF= document.getElementById('svg-fem-mobile');
                const backF= document.getElementById('svg-fem-back-mob');
                const frontM= document.getElementById('svg-male-mobile');
                const backM= document.getElementById('svg-male-back-mob');
                if(frontF){ frontF.style.display= 'block'; }
                if(backF){ backF.style.display='none';}
                if(frontM){ frontM.style.display='block';}
                if(backM){ backM.style.display='none';}
                originalMobileToggle();
            };
        }

        /* crea il tag per gli hover SVG */
        (function() {
            const dynStyle = document.createElement('style');
            dynStyle.id = 'dyn-accent';
            document.head.appendChild(dynStyle);
        })();

        /* CLICK zone muscolari*/
        function initTouch(svgId, zones){
            zones.forEach(({id, href}) => {
                const el= document.querySelector(`#${svgId} #${id}`);
                console.log(`Cerco #${svgId} #${id}:`, el ? 'TROVATO' : 'NON TROVATO');
                if(!el) return;

                el.addEventListener('click', () => {
                    window.location.href= href;
                }, {passive: false});
            });
        }

        /* CHIAMATE A FUNZIONE */
        
        /* Corpo F davanti*/
        initTouch('svg-fem', [
            { id: 'am23', href: 'esercizi.html?zona=Gambe'},
            { id: 'am31', href: 'esercizi.html?zona=Braccia' },
             { id: 'am30', href: 'esercizi.html?zona=Braccia' },
            { id: 'am34', href: 'esercizi.html?zona=Spalle'},

            { id: 'am36', href: 'esercizi.html?zona=Petto'},
            { id: 'am55', href: 'esercizi.html?zona=Petto'}
        ]);

        /* Corpo F dietro*/
        initTouch('svg-fem-back', [
            { id: 'am38', href: 'esercizi.html?zona=Gambe'},
            { id: 'am39', href: 'esercizi.html?zona=Gambe'},
            { id: 'am36', href: 'esercizi.html?zona=Schiena'},
            { id: 'am63', href: 'esercizi.html?zona=Schiena'},
            { id: 'am28', href: 'esercizi.html?zona=Spalle'},
            { id: 'am25', href: 'esercizi.html?zona=Glutei'},
            { id: 'am26', href: 'esercizi.html?zona=Glutei'},
            { id: 'am32', href: 'esercizi.html?zona=Braccia'},
        ]);

        /* TOUCH zone muscolari mobile*/
        function initMobileTouch(svgId, zones){
            zones.forEach(({id, href}) => {
                const el= document.querySelector(`#${svgId} #${id}`);
                console.log(`Cerco #${svgId} #${id}:`, el ? 'TROVATO' : 'NON TROVATO');
                if(!el) return;

                const paths= el.querySelectorAll('path');
                let touchTime= null;

                /* highlight al tocco */
                el.addEventListener('touchstart', (e) => {

                    /* Colora subito al tocco */
                    const c= getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
                    paths.forEach(p => p.setAttribute('fill', c));

                    /* Salva momento del tocco*/
                    touchTime= Date.now();
                }, {passive: false});

                el.addEventListener('touchend', (e) => {

                    const durata= Date.now() - touchTime;

                    if(durata < 500){
                        /* Naviga dopo una piccola pausa cosi l'utente vede il flash del colore*/
                        setTimeout(() => {
                            window.location.href= href;
                        }, 80);
                    }else{
                        /* tocco lungo: rimuovi il colore senza navigare*/
                        paths.forEach(p => p.removeAttribute('fill'));
                    }
                }, {passive:false});

                /* Se il dito scivola fuori dalla zona rimuovi il colore */
                el.addEventListener('touchcancel', () => {
                    paths.forEach(p => p.removeAttribute('fill'));
                });
            });
        }
        
        /* Corpo F davanti*/
        initMobileTouch('svg-fem-mobile', [
