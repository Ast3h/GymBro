<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBros — Profilo</title>
    <!-- Favicon-->
     <link rel="icon" type="image/svg+xml" sizes="32x32" href="Favicon32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

    <!-- Stili condivisi-->
     <link rel="stylesheet" href="stili.css">

     <style>
        /* Stili specifici pagina profilo*/
        .page-content{ 
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-left: 20px;
        }

        .prof-header{
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 24px;
            border-bottom: 0.5px solid var(--border);
            margin-bottom: 24px;
            margin-left: 20px;
        }

        .avatar{
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 500;
            color: var(--accent);
            flex-shrink: 0;
        }

        .prof-info{ flex: 1;}

        .prof-name{
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text);
        }

        .prof-email{
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 3px;
        }

        .obj-pill{
            display: inline-block;
            margin-top: 8px;
            margin-bottom: 8px;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            padding: 3px 50px;
            border-radius: 20px;
            background: var(--accent-dim);
            color: var(--accent);
            border: 0.5px solid rgba(237, 36, 155, 0.3);
        }

        .saved-chip{
            font-size: 0.72rem;
            padding: 10px 14px;
            border-radius: 20px;
            background: var(--surface2);
            color: var(--text);
            border: 0.5px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.18s, color 0.18s;
        }

        .saved-chip:hover{
            border-color: var(--accent);
            color: var(--accent);
        }

        .logout-row{
            padding-top: 20px;
            border-top: 0.5px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }

        @media (max-width: 600px){
            .prof-header {flex-wrap: wrap;}
            .prof-header .btn-ghost{width: 100%; text-align: center;}
        }

        #schede-salvate{
            padding-left: 38px;
        }
     </style>
</head>
<body>

                </div>

       <!-- BOTTOM NAV MOBILE-->

                <svg viewBox="0 0 24 24">

                    <line x1="8" y1="8" x2="16" y2="8"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>

                </svg><span>Schede</span></a>
            <a href="profilo.html"  class="bottom-nav-item active"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Profilo</span></a>
        </nav>

        <script>
            function toggleSidebar(){
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('sidebar-overlay').classList.toggle('open');
            }
            function closeSidebar(){
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebar-overlay').classList.remove('open');
            }

            let accentIsPink=true;

            function applyAccent(isPink){
                const root= document.documentElement;
                const sw= document.getElementById('color-switch');
                const dot= document.getElementById('notif-dot');
                const logo= document.querySelector('.logo span');
                const tema= document.getElementById('impost-tema');
                const c= isPink? '#ed249b' : "#8cc63f";
                const dim= isPink? 'rgba(237, 36, 155, 0.12)' : 'rgba(140, 198, 63, 0.12)';
                const glow= isPink? 'rgba(237, 36, 155, 0.12)' : 'rgba(140, 198, 63, 0.12)';
                root.style.setProperty('--accent', c);
                root.style.setProperty('--accent-dim', dim);
                root.style.setProperty('--accent-glow', glow);
                if(sw) {
                    sw.classList.toggle('pink', isPink);
                    sw.classList.toggle('green', !isPink);
                }
                if(dot){ dot.style.background= c;}
                if(logo){ logo.style.color= c;}
                if(tema){ tema.textContent= isPink ? 'Rosa':'Verde';}
            }

            function toggleAccent(){
            accentIsPink= !accentIsPink;
            applyAccent(accentIsPink);
            localStorage.setItem('gymbros-accent', accentIsPink? 'pink' : 'green');
        }

            /* Applica il tema salvato al carimento della pagina*/
            (function initAccent(){
            const saved = localStorage.getItem('gymbros-accent');
            if(saved=== 'green'){
                accentIsPink= false;
                applyAccent(false);
            }else{
                applyAccent(true);
            }
        })();
